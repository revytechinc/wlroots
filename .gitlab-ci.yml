include: https://gitlab.freedesktop.org/emersion/dalligi/-/raw/master/templates/multi.yml
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
alpine:
  extends: .dalligi
  pages: true
archlinux:
  extends: .dalligi
freebsd:
  extends: .dalligi
